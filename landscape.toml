# Terrain source configuration.
# Edit this file to switch between baked tile sets without recompiling.
# Paths are relative to the workspace root (where you run `cargo run`).

[terrain]
tile_root       = "assets/tiles"
normal_root     = "assets/tiles/normal"
diffuse_exr     = "assets/height_maps/16k Rocky Terrain Heightmap/Diffuse 16k Rocky Terrain.exr"
# Highest LOD index that has baked tiles. For a 4096px map / 256px tile_size,
# the mip pyramid is: L0=16×16, L1=8×8, L2=4×4, L3=2×2 (coarsest).
# Clipmap rings above this level resample height from L3 tiles.
max_mip_level   = 5
#3 for 4096, 5 for 16384

# Mip level used to build the single global collision heightfield.
# Level 2 = 4 m/cell (256 tile reads, ~128 MB) — matches original per-tile precision.
# Level 3 = 8 m/cell (64 tile reads,  ~32 MB)  — good enough for most cases.
# Lower values give finer collision at the cost of more RAM and startup time.
# If the chosen level is not pre-baked, tiles are built from finer mip data.
collision_mip_level = 0

[terrain_config]
# Source of truth for uniform terrain scale.
# The app copies this into the runtime `TerrainConfig.world_scale` field, and
# bake_tiles uses it automatically when --world-scale is not provided.
# Set to 2.0 to make the same landscape twice as large in X, Y, and Z.
world_scale     = 1.0

# Clipmap LOD ring count. Each extra level doubles the view radius.
# Outermost radius = 512 * 2^(clipmap_levels-1) world units.
# 7 → ~32 000 wu. Keep low if the terrain is small to avoid loading tiles
# that map to flat zero-height resamples far outside the heightmap bounds.
clipmap_levels  = 12

# Base world-space height range: a fully-white height texel (R16Unorm = 1.0)
# maps to this many world units on the Y axis before `world_scale` is applied.
#
# This value is the single source of truth for the base height scale:
#   - The renderer reads it here at runtime, then multiplies it by
#     `world_scale` so the whole terrain scales uniformly.
#   - bake_tiles reads it here automatically when --height-scale is not
#     provided on the command line, and applies the same `world_scale`
#     multiplier when deriving normals.
#
# If you change this value, re-bake your tiles so the normals remain correct.
height_scale    = 2048.0

# Set to true if the diffuse EXR colours appear V-flipped (e.g. snow at the
# bottom of the screen instead of matching mountain peaks). Flips the V UV
# coordinate when sampling the macro colour texture.
# macro_color_flip_v = false
